<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access key — Cotton AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --bg-elevated: #111113;
      --bg-card: #16161a;
      --text: #e4e2db;
      --text-dim: #7a7872;
      --text-muted: #4a4944;
      --gold: #c8a96e;
      --gold-bright: #dbbd84;
      --gold-dim: #8a7545;
      --border: rgba(255, 255, 255, 0.06);
      --border-gold: rgba(200, 169, 110, 0.2);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Outfit', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 40% at 20% 30%, rgba(200, 169, 110, 0.05), transparent),
        radial-gradient(ellipse 40% 50% at 80% 70%, rgba(200, 169, 110, 0.03), transparent);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(9, 9, 11, 0.75);
      backdrop-filter: blur(20px) saturate(1.2);
    }
    .logo {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-line { width: 20px; height: 1px; background: var(--gold-dim); }
    .logo a { color: inherit; text-decoration: none; }
    .back { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; }
    .back:hover { color: var(--text); }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 48px 40px 44px;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
    }
    .overline {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .overline::before { content: ''; width: 32px; height: 1px; background: var(--gold-dim); }
    h1 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    h1 em { font-style: italic; color: var(--gold); }
    .lede { font-size: 14px; color: var(--text-dim); line-height: 1.7; font-weight: 300; margin-bottom: 32px; }
    label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    input[type="password"] {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 16px 18px;
      font-family: var(--sans);
      font-size: 15px;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--border-gold);
    }
    .err {
      font-size: 13px;
      color: #f87171;
      margin: -12px 0 20px;
      min-height: 1.2em;
    }
    .btn {
      width: 100%;
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 16px 24px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
    }
    .btn:hover { background: var(--gold-bright); transform: translateY(-1px); }
    .panel { display: none; }
    .panel.on { display: block; }
    .current-key {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 20px;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-align: center;
      padding: 24px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-gold);
      margin: 8px 0 24px;
    }
    .meta { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 20px; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn-outline {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 12px 24px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--sans);
    }
    .btn-outline:hover { border-color: var(--text-dim); color: var(--text); }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    @media (max-width: 520px) {
      header { padding: 20px 20px; }
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="logo">
        <span class="logo-line" aria-hidden="true"></span>
        <a href="https://EhabRiaz1.github.io/CottonApp/">Cotton AI</a>
      </div>
      <a class="back" href="https://EhabRiaz1.github.io/CottonApp/">← Home</a>
    </header>
    <div class="main">
      <div class="card">
        <p class="overline">Confidential</p>
        <h1>Current <em>portal</em> key</h1>
        <p class="lede" id="gateHelp">Enter the static access password to view the time-based key for the private area.</p>

        <form id="gateForm" class="panel on" aria-labelledby="gate-title">
          <h2 class="visually-hidden" id="gate-title">Unlock</h2>
          <label for="staticPass">Access password</label>
          <input id="staticPass" type="password" autocomplete="current-password" required />
          <p class="err" id="gateErr" role="alert"></p>
          <button type="submit" class="btn">Reveal key</button>
        </form>

        <div id="reveal" class="panel" aria-live="polite">
          <p class="overline" style="margin-bottom: 12px;">Active 12h key</p>
          <p class="current-key" id="rotatingOut">—</p>
          <p class="meta" id="rotationMeta">—</p>
          <div class="actions">
            <button type="button" class="btn-outline" id="copyBtn">Copy key</button>
            <a class="btn-outline" href="https://EhabRiaz1.github.io/CottonApp/private-portal/" style="text-decoration: none; display: inline-block;">Open private portal</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Static gate: change this value and redeploy. Keep in sync for anyone who should use this page.
    var STATIC_GATE_PASSWORD = 'R8kM-4nTp-7wQx-2VjL';
  </script>
  <script src="shared/rotating-auth.js"></script>
  <script>
    (function () {
      var form = document.getElementById('gateForm');
      var reveal = document.getElementById('reveal');
      var out = document.getElementById('rotatingOut');
      var meta = document.getElementById('rotationMeta');
      var err = document.getElementById('gateErr');
      var help = document.getElementById('gateHelp');

      function showReveal() {
        form.classList.remove('on');
        form.style.display = 'none';
        reveal.classList.add('on');
        help.style.display = 'none';
        refresh();
        setInterval(refresh, 30 * 1000);
      }

      function refresh() {
        if (!CottonRotatingAuth) return;
        CottonRotatingAuth.getCurrent12hPassword().then(function (k) {
          out.textContent = k;
        });
        var t = CottonRotatingAuth.getWindowTimes();
        var end = new Date(t.next);
        meta.textContent =
          'This key is valid until ' +
          end.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }) +
          ' (12h window).';
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        err.textContent = '';
        var v = document.getElementById('staticPass').value.replace(/\s+/g, '');
        if (v === STATIC_GATE_PASSWORD) {
          showReveal();
        } else {
          err.textContent = 'That password is not correct.';
        }
      });

      document.getElementById('copyBtn').addEventListener('click', function () {
        var t = out.textContent;
        if (t && t !== '—' && navigator.clipboard) {
          navigator.clipboard.writeText(t);
        }
      });
    })();
  </script>
</body>
</html>
